name: Build rootless deb

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot perl curl git unzip file xz-utils
          sudo apt-get install -y ldid || true
          sudo apt-get install -y libplist-utils || true
          
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iPhoneOS SDK
        run: |
          mkdir -p $THEOS/sdks
          curl -L -o /tmp/sdk.tar.xz https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xf /tmp/sdk.tar.xz -C $THEOS/sdks

      - name: Build package
        run: |
          make clean package THEOS_PACKAGE_SCHEME=rootless

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: WeChatMiniProgramForward-rootless
          path: packages/*.deb
